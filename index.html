<!DOCTYPE html>
<html lang="en-us">
<head>
    <title>Granny - Original</title>
    <meta charset="utf-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000; /* Original games always start with pure black */
            font-family: 'Courier New', Courier, monospace;
        }
        #unity-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #unity-canvas {
            width: 100%;
            height: 100%;
            background: #000;
        }
        #unity-loading-bar {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        /* Classic minimalist loading text instead of a modern green bar */
        #loading-text {
            color: #fff;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        #unity-progress-bar-empty {
            width: 250px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
        }
        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #fff; /* White bar is more "classic" than green */
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="unity-loading-bar">
            <div id="loading-text">LOADING...</div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <script>
        // CORE GAME LOADING - AD-FREE
        const buildUrl = "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build";
        const loaderUrl = buildUrl + "/Granny.loader.js";
        const canvas = document.querySelector("#unity-canvas");
        const loadingBar = document.querySelector("#unity-loading-bar");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");

        // Helper to fetch and merge game files without tracking/ad scripts
        async function mergeUnityWebFiles(baseUrl, filePrefix, totalParts, extension) {
            const buffers = [];
            for (let i = 1; i <= totalParts; i++) {
                const response = await fetch(`${baseUrl}/${filePrefix}_part${i}.${extension}`);
                if (!response.ok) throw new Error(`Asset part missing`);
                buffers.push(await response.arrayBuffer());
            }
            const totalLength = buffers.reduce((acc, b) => acc + b.byteLength, 0);
            const combined = new Uint8Array(totalLength);
            let offset = 0;
            buffers.forEach(b => {
                combined.set(new Uint8Array(b), offset);
                offset += b.byteLength;
            });
            return combined;
        }

        async function startOriginalGranny() {
            try {
                // Fetching the game data
                const [dataBuffer, wasmBuffer] = await Promise.all([
                    mergeUnityWebFiles(buildUrl, "Granny", 2, "data"),
                    mergeUnityWebFiles(buildUrl, "Granny", 2, "wasm")
                ]);

                const config = {
                    dataUrl: URL.createObjectURL(new Blob([dataBuffer])),
                    frameworkUrl: buildUrl + "/Granny.framework.js",
                    codeUrl: URL.createObjectURL(new Blob([wasmBuffer])),
                    streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/StreamingAssets",
                    companyName: "DVloper", // Corrected to the original developer name
                    productName: "Granny",
                    productVersion: "1.0",
                };

                const script = document.createElement("script");
                script.src = loaderUrl;
                script.onload = () => {
                    createUnityInstance(canvas, config, (progress) => {
                        progressBarFull.style.width = (100 * progress) + "%";
                    }).then((instance) => {
                        loadingBar.style.display = "none";
                    });
                };
                document.body.appendChild(script);
            } catch (e) {
                console.error("Original load failed", e);
            }
        }

        startOriginalGranny();
    </script>
</body>
</html>
