<!DOCTYPE html>
<html lang="en">
<head>
    <title>Game Library</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background-color: #f0f2f5; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }
        nav { padding: 15px; display: flex; justify-content: center; background: #fff; border-bottom: 1px solid #e2e8f0; color: #64748b; font-size: 0.8rem; font-weight: 600; z-index: 10; }
        
        .container { flex: 1; display: flex; align-items: center; justify-content: center; gap: 25px; padding: 40px; flex-wrap: wrap; }
        .card { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 280px; }
        
        h2 { margin: 0; font-size: 1.4rem; color: #1a1a1a; }
        p { color: #64748b; font-size: 0.85rem; margin: 10px 0 25px; }
        
        .btn-launch { background-color: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 0.8rem; }
        .btn-launch:hover { background-color: #0056b3; }

        /* Fullscreen Stage */
        #stage { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        
        /* The "Clean" Loading Shield */
        #boot-shield {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1005;
            transition: opacity 0.5s ease;
        }

        .loader-text { color: #007bff; font-family: monospace; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 10px; }
        .loader-sub { color: #4b5563; font-size: 0.8rem; font-family: sans-serif; }

        .overlay-ui { position: absolute; top: 20px; left: 20px; z-index: 1010; }
        .exit-btn { color: white; text-decoration: none; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 5px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; }
        
        iframe { width: 100%; height: 100%; border: none; background: #000; }
    </style>
</head>
<body>

    <nav>BUILD_v1.1.0</nav>

    <div class="container" id="hub">
        <div class="card">
            <h2>Granny</h2>
            <p>Survival Horror Simulation</p>
            <button class="btn-launch" onclick="boot('granny')">Launch</button>
        </div>
        <div class="card">
            <h2>Space Waves</h2>
            <p>Geometric Arcade Protocol</p>
            <button class="btn-launch" onclick="boot('spacewaves')">Launch</button>
        </div>
    </div>

    <div id="stage">
        <div class="overlay-ui"><button class="exit-btn" onclick="location.reload()">← BACK TO LIBRARY</button></div>
        
        <div id="boot-shield">
            <div class="loader-text">INITIALIZING SYSTEM...</div>
            <div class="loader-sub">Synchronizing assets and bypassing local blocks</div>
        </div>

        <div id="game-mount" style="width:100%; height:100%;"></div>
    </div>

    <script>
        // Kill the YaGames errors immediately
        window.YaGames = { init: () => Promise.resolve({ deviceInfo: {type: 'desktop'}, adv: {showFullscreenAdv: () => {}} }) };

        function boot(id) {
            document.getElementById('hub').style.display = 'none';
            document.querySelector('nav').style.display = 'none';
            document.getElementById('stage').style.display = 'block';
            const mount = document.getElementById('game-mount');
            const shield = document.getElementById('boot-shield');

            // Set the game source
            if (id === 'granny') {
                mount.innerHTML = `<iframe id="game-frame" src="https://ext-6204786.extreme-games.io/6204786/c6f9f8c6-ba46-43bc-9c69-273ee44e0808/" allow="autoplay; fullscreen; gamepad"></iframe>`;
            } else {
                mount.innerHTML = `<iframe id="game-frame" src="https://space-waves.co/game/space-waves/" allow="autoplay; fullscreen"></iframe>`;
            }

            // Keep our custom loader visible for 6 seconds while the "ugly" ones finish in the background
            setTimeout(() => {
                shield.style.opacity = '0';
                setTimeout(() => { shield.style.display = 'none'; }, 500);
            }, 6000);
        }
    </script>
</body>
</html>
