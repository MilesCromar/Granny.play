<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | Archive</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22Inter, Arial, sans-serif%22 font-weight=%22900%22 fill=%22white%22>N</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: default; }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #eee;
            overflow: hidden;
        }

        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 30% 50%, #111 0%, #000 70%);
            animation: bgShift 12s ease-in-out infinite alternate;
            z-index: 0;
        }
        @keyframes bgShift {
            0% { background: radial-gradient(ellipse at 30% 50%, #111 0%, #000 70%); }
            100% { background: radial-gradient(ellipse at 70% 50%, #0d0d0d 0%, #000 70%); }
        }

        #menu-ui {
            text-align: center;
            z-index: 10;
        }

        .header-text h1 {
            font-size: 5rem;
            letter-spacing: 20px;
            margin-right: -20px;
            text-transform: uppercase;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 116, 217, 0.08);
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 0.8s ease forwards;
        }

        .header-text p {
            color: #555;
            letter-spacing: 8px;
            margin-right: -8px;
            font-size: 0.75rem;
            margin-top: 8px;
            font-weight: 700;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.8s ease 0.15s forwards;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: #333;
            margin: 35px auto;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.3s forwards;
        }

        .lib-btn {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            padding: 16px 44px;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 4px;
            padding-right: 40px;
            border: 1px solid rgba(0, 116, 217, 0.5);
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.4s ease;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0, 116, 217, 0.15);
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.8s ease 0.45s forwards;
        }

        .lib-btn:hover {
            background: linear-gradient(135deg, rgba(0, 31, 63, 0.6), rgba(0, 116, 217, 0.15));
            box-shadow: 0 0 35px rgba(0, 116, 217, 0.4);
            border-color: #0074D9;
            transform: translateY(-2px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div id="menu-ui">
        <div class="header-text">
            <h1>NULL</h1>
            <p>SYSTEM ARCHIVE</p>
        </div>
        <div class="divider"></div>
        <a href="library.html" class="lib-btn">OPEN LIBRARY</a>
    </div>
</body>
</html>
