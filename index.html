<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granny | Escape the House</title>
    <style>
        /* --- CSS STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        body {
            /* Black to Dark Gray Gradient */
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .header-text {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-text h1 {
            font-size: 5rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .header-text p {
            font-family: 'Arial', sans-serif;
            color: #666;
            letter-spacing: 2px;
            margin-top: -10px;
        }

        /* --- CARD LAYOUT --- */
        .card-container {
            display: flex;
            gap: 30px;
            perspective: 1000px; /* Essential for 3D depth */
        }

        .game-card {
            background: #001f3f; /* Navy Blue */
            width: 280px;
            height: 380px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            
            /* High-end 3D Effect Settings */
            transform-style: preserve-3d;
            transition: box-shadow 0.3s ease;
        }

        .game-card:hover {
            box-shadow: 0 30px 60px rgba(0, 31, 63, 0.5);
        }

        /* Content inside the card that "pops" out */
        .card-content {
            transform: translateZ(60px); 
            text-align: center;
        }

        .card-content h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #fff;
        }

        .card-content p {
            font-family: 'Arial', sans-serif;
            font-size: 0.9rem;
            color: #bdc3c7;
            margin-bottom: 25px;
        }

        .play-btn {
            background: #ffffff;
            color: #001f3f;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            display: inline-block;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            background: #0074D9;
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="header-text">
        <h1>GRANNY</h1>
        <p>SHE HEARS EVERYTHING.</p>
    </div>

    <div class="card-container">
        <div class="game-card" data-tilt data-tilt-max="15" data-tilt-glare data-tilt-max-glare="0.4">
            <div class="card-content">
                <h2>CHAPTER 1</h2>
                <p>The Original Horror. Can you survive 5 nights in the house?</p>
                <a href="#" class="play-btn">PLAY NOW</a>
            </div>
        </div>

        <div class="game-card" data-tilt data-tilt-max="15" data-tilt-glare data-tilt-max-glare="0.4">
            <div class="card-content">
                <h2>CHAPTER 2</h2>
                <p>Grandpa has joined the hunt. Double the danger.</p>
                <a href="#" class="play-btn">LOCKED</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        // Initialize the tilt effect
        VanillaTilt.init(document.querySelectorAll(".game-card"), {
            max: 15,
            speed: 400,
            glare: true,
            "max-glare": 0.3,
        });
    </script>

</body>
</html>
