        getLanguage: () => 'en',
        features: { LoadingProgress: { set: () => {} } },
        stats: { isCoreLoaded: () => true },
        adv: { showFullscreenAdv: (c) => { if(c && c.callbacks) c.callbacks.onClose(); } }

<script>
    function launchGame(url) {
        document.getElementById('menu-ui').classList.add('menu-hidden');
        document.getElementById('game-container').style.display = 'flex';
        const frame = document.getElementById('game-frame');
        frame.src = url; 

        // Forced injection: This pushes the "fake" SDK into the game file as it loads
        frame.onload = function() {
            try {
                frame.contentWindow.ysdk = window.ysdk;
                frame.contentWindow.YaGames = window.YaGames;
            } catch(e) { 
                console.warn("Security blocked direct injection. Relying on the game-file script."); 
            }
        };
    }

</script>
