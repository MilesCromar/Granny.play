<!DOCTYPE html>
<html lang="en">
<head>
    <title>System Library</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-main: #0a0b0d;
            --card-bg: #16181d;
            --accent-blue: #2563eb;
            --text-main: #ffffff;
            --text-dim: #64748b;
            --border: #272a30;
        }

        body {
            margin: 0;
            background-color: var(--bg-main);
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Nav with Versioning */
        nav {
            background: #000;
            padding: 12px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo { font-size: 0.75rem; letter-spacing: 2px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        .nav-version { font-family: monospace; font-size: 0.7rem; color: var(--accent-blue); background: rgba(37, 99, 235, 0.1); padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(37, 99, 235, 0.2); }

        .container {
            height: calc(100vh - 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .card-content { padding: 32px; }
        .game-card h2 { margin: 0 0 8px 0; font-size: 1.2rem; font-weight: 600; }
        .game-card p { margin: 0 0 24px 0; color: var(--text-dim); font-size: 0.85rem; line-height: 1.6; }

        .btn-launch {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 0;
            width: 100%;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* Stage Area */
        #stage {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
        }

        .btn-exit {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: #e11d48;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
        }

        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
            color: var(--accent-blue);
        }

        iframe, canvas { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">System Library</div>
        <div class="nav-version">BUILD_v1.0.4</div>
        <div style="width:100px"></div> </nav>

    <div class="container" id="hub-view">
        <div id="hub-grid">
            <div class="game-card">
                <div class="card-content">
                    <h2>Granny</h2>
                    <p>Standard Horror Simulation. Initializing original Unity assets via secure stream.</p>
                    <button class="btn-launch" id="launch-granny">Launch</button>
                </div>
            </div>

            <div class="game-card">
                <div class="card-content">
                    <h2>Space Waves</h2>
                    <p>Geometric velocity protocol. High-frequency I/O stream synchronization.</p>
                    <button class="btn-launch" id="launch-spacewaves">Launch</button>
                </div>
            </div>
        </div>
    </div>

    <div id="stage">
        <button class="btn-exit" onclick="location.reload()">Terminate Process</button>
        <div id="status">INITIALIZING...</div>
        <div id="mount" style="width:100%; height:100%;"></div>
    </div>
