<!DOCTYPE html>
<html lang="en-us">
<head>
    <title>Granny | Play Now</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #game-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        h1 { margin-top: 0; font-size: 2rem; color: #000; font-weight: 700; }
        p { color: #4b5563; font-size: 1.1rem; margin-bottom: 30px; }

        .btn-primary {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover { background-color: #0056b3; }

        #unity-container { display: none; width: 100vw; height: 100vh; background: #000; }
        #unity-canvas { width: 100%; height: 100%; }
        
        #loading-overlay {
            position: fixed;
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="game-card">
        <h1>Granny</h1>
        <p>Your <b>index.html</b> is working. Ready to escape?</p>
        <button class="btn-primary" id="start-button">Click Me</button>
    </div>

    <div id="unity-container">
        <div id="loading-overlay">LOADING...</div>
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        // --- THE FIX: MOCK YANDEX SDK ---
        // This stops the "YaGames is not defined" error
        window.YaGames = {
            init: function() {
                return new Promise((resolve) => {
                    console.log("Mock Yandex SDK Initialized");
                    resolve({
                        deviceInfo: { type: "desktop" },
                        adv: { showFullscreenAdv: () => {}, showRewardedVideo: () => {} }
                    });
                });
            }
        };

        const startBtn = document.getElementById('start-button');
        const gameCard = document.getElementById('game-card');
        const unityContainer = document.getElementById('unity-container');
        const canvas = document.querySelector("#unity-canvas");

        startBtn.addEventListener('click', () => {
            gameCard.style.display = 'none';
            unityContainer.style.display = 'flex';
            unityContainer.style.justifyContent = 'center';
            unityContainer.style.alignItems = 'center';
            loadGranny();
        });

        async function loadGranny() {
            const buildUrl = "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build";
            
            async function mergeFiles(prefix, parts, ext) {
                const buffers = [];
                for (let i = 1; i <= parts; i++) {
                    const res = await fetch(`${buildUrl}/${prefix}_part${i}.${ext}`);
                    if(!res.ok) throw new Error("Asset part missing");
                    buffers.push(await res.arrayBuffer());
                }
                const combined = new Uint8Array(buffers.reduce((a, b) => a + b.byteLength, 0));
                let offset = 0;
                buffers.forEach(b => { combined.set(new Uint8Array(b), offset); offset += b.byteLength; });
                return combined;
            }

            try {
                const [data, wasm] = await Promise.all([
                    mergeFiles("Granny", 2, "data"),
                    mergeFiles("Granny", 2, "wasm")
                ]);

                const config = {
                    dataUrl: URL.createObjectURL(new Blob([data])),
                    frameworkUrl: buildUrl + "/Granny.framework.js",
                    codeUrl: URL.createObjectURL(new Blob([wasm])),
                    streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/StreamingAssets",
                    companyName: "DVloper",
                    productName: "Granny",
                };

                const script = document.createElement("script");
                script.src = buildUrl + "/Granny.loader.js";
                script.onload = () => {
                    createUnityInstance(canvas, config, (progress) => {
                        // Progress logic can go here
                    }).then(() => {
                        console.log("Granny Loaded Successfully");
                    });
                };
                document.body.appendChild(script);
            } catch (err) {
                console.error("Critical Load Error:", err);
            }
        }
    </script>
</body>
</html>
