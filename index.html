<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | Archive</title>
    <style>
        /* --- Dark & Muted Theme --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #111111 0%, #050505 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d1d1d1;
            overflow: hidden;
        }

        .header-text {
            text-align: center;
            margin-bottom: 80px;
        }

        .header-text h1 {
            font-size: 5rem;
            letter-spacing: 25px;
            text-transform: uppercase;
            font-weight: 900;
            color: #ffffff;
            opacity: 0.8;
            margin-left: 25px; /* Centers the text properly with letter spacing */
        }

        .header-text p {
            color: #222;
            letter-spacing: 8px;
            font-size: 0.7rem;
            margin-top: 5px;
        }

        /* --- Card Layout --- */
        .card-container {
            display: flex;
            gap: 40px;
            perspective: 1000px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.01);
            width: 280px;
            height: 380px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: border-color 0.8s ease, background 0.8s ease;
        }

        .game-card:hover {
            background: rgba(0, 31, 63, 0.05);
            border-color: rgba(0, 116, 217, 0.1);
        }

        .card-content {
            transform: translateZ(15px); 
            text-align: center;
        }

        .card-content h2 {
            font-size: 1.8rem;
            color: #444; 
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.6s ease;
        }

        .card-content .sub-text {
            display: block;
            font-size: 0.7rem;
            color: #222;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 30px;
            transition: color 0.6s ease;
        }

        .game-card:hover h2 { color: #fff; }
        .game-card:hover .sub-text { color: #555; }

        /* --- Reactive Button --- */
        .play-btn {
            background: transparent;
            color: #333;
            padding: 10px 24px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            transition: all 0.4s ease;
        }

        /* Light up effect on hover */
        .play-btn:hover {
            color: #ffffff;
            border-color: #0074D9;
            background: rgba(0, 116, 217, 0.4); /* Stronger Navy Glow */
            box-shadow: 0 0 15px rgba(0, 116, 217, 0.4);
            text-shadow: 0 0 5px #fff;
        }

        .locked {
            opacity: 0.1;
            cursor: default;
        }
    </style>
</head>
<body>

    <div class="header-text">
        <h1>NULL</h1>
        <p>SYSTEM ARCHIVE</p>
    </div>

    <div class="card-container">
        <div class="game-card">
            <div class="card-content">
                <h2>Granny</h2>
                <span class="sub-text">Chapter One</span>
                <a href="#" class="play-btn">LAUNCH</a>
            </div>
        </div>

        <div class="game-card locked">
            <div class="card-content">
                <h2>Void</h2>
                <span class="sub-text">Locked</span>
                <a href="#" class="play-btn">NULL</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        VanillaTilt.init(document.querySelectorAll(".game-card"), {
            reverse: true,      // TILTS AWAY FROM MOUSE
            max: 2,             // VERY SMALL TILT
            speed: 3000,        // VERY SLOW
            glare: true,
            "max-glare": 0.1,
            scale: 1
        });
    </script>

</body>
</html>
