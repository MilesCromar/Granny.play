<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granny | Minimal Play</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #111;
            --light: #f8fafc;
            --accent: #f59e0b;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #111; color: #fff; overflow: hidden;
        }

        #unity-container { width: 100%; height: 100%; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; display: block; }

        /* Fullscreen Button */
        #fs-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 99;
            background: rgba(255,255,255,0.1); color: #fff;
            border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px;
            border-radius: 4px; cursor: pointer; font-size: 12px;
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s; backdrop-filter: blur(5px);
        }
        #fs-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Loading Overlay */
        #loading-overlay {
            position: absolute; inset: 0; background: #111;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.5s;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="unity-container">
        <div id="loading-overlay">
            <div class="spinner"></div>
            <div id="load-status">Merging Game Files...</div>
        </div>
        
        <canvas id="unity-canvas"></canvas>
        <button id="fs-btn">Fullscreen</button>
    </div>

    <script>
        // 1. FIX: Mock Yandex SDK to prevent "YaGames is not defined" error
        window.YaGames = {
            init: function() {
                return new Promise((resolve) => {
                    resolve({
                        deviceInfo: { type: "desktop" },
                        environment: { i18n: { lang: "en" } },
                        adv: { showFullscreenAdv: { callbacks: {} } }
                    });
                });
            }
        };

        // 2. SDK CONFIG
        window.SDK_OPTIONS = {
            gameId: "jp112o3o4hzgrnc7zaewjkrfk282pul8",
            onEvent: function (a) {
                if (a.name === "SDK_GAME_PAUSE" && myGameInstance) myGameInstance.SendMessage('AudioManager', 'MuteAudio');
                if (a.name === "SDK_GAME_START" && myGameInstance) myGameInstance.SendMessage('AudioManager', 'UnmuteAudio');
            }
        };

        // 3. GAME ENGINE LOGIC
        const canvas = document.querySelector("#unity-canvas");
        const loadingOverlay = document.querySelector("#loading-overlay");
        const loadStatus = document.querySelector("#load-status");
        const buildUrl = "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build";
        let myGameInstance = null;

        async function mergeUnityWebFiles(baseUrl, filePrefix, totalParts, extension) {
            const buffers = [];
            for (let i = 1; i <= totalParts; i++) {
                const response = await fetch(`${baseUrl}/${filePrefix}_part${i}.${extension}`);
                if (!response.ok) throw new Error("Failed to load part " + i);
                buffers.push(await response.arrayBuffer());
            }
            const combined = new Uint8Array(buffers.reduce((acc, b) => acc + b.byteLength, 0));
            let offset = 0;
            buffers.forEach(b => { combined.set(new Uint8Array(b), offset); offset += b.byteLength; });
            return combined;
        }

        async function initializeGame() {
            try {
                // Load and merge binary data
                const [dataBuffer, wasmBuffer] = await Promise.all([
                    mergeUnityWebFiles(buildUrl, "Granny", 2, "data"),
                    mergeUnityWebFiles(buildUrl, "Granny", 2, "wasm")
                ]);

                loadStatus.innerText = "Starting Engine...";

                const config = {
                    dataUrl: URL.createObjectURL(new Blob([dataBuffer])),
                    frameworkUrl: buildUrl + "/Granny.framework.js",
                    codeUrl: URL.createObjectURL(new Blob([wasmBuffer])),
                    streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/StreamingAssets",
                    companyName: "Anastasia Kazantseva",
                    productName: "Granny",
                    productVersion: "1.0",
                };

                const script = document.createElement("script");
                script.src = buildUrl + "/Granny.loader.js";
                script.onload = () => {
                    createUnityInstance(canvas, config, (progress) => {
                        loadStatus.innerText = "Loading: " + Math.round(progress * 100) + "%";
                    }).then((instance) => {
                        myGameInstance = instance;
                        loadingOverlay.style.opacity = "0";
                        setTimeout(() => loadingOverlay.style.display = "none", 500);
                    });
                };
                document.body.appendChild(script);
            } catch (e) { 
                loadStatus.innerText = "Error loading game. Check console.";
                console.error(e); 
            }
        }
