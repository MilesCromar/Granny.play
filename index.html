<!DOCTYPE html>
<html lang="en">
<head>
    <title>Game Library</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background-color: #f0f2f5; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        nav { padding: 15px; display: flex; justify-content: center; background: #fff; border-bottom: 1px solid #e2e8f0; color: #64748b; font-size: 0.8rem; font-weight: 600; }
        .container { flex: 1; display: flex; align-items: center; justify-content: center; gap: 25px; padding: 40px; flex-wrap: wrap; }
        .card { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 280px; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); }
        h2 { margin: 0; font-size: 1.4rem; color: #1a1a1a; }
        p { color: #64748b; font-size: 0.85rem; margin: 10px 0 25px; }
        .btn-launch { background-color: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 0.8rem; }
        
        #stage { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        .overlay-ui { position: absolute; top: 20px; left: 20px; z-index: 1001; }
        .exit-btn { color: white; text-decoration: none; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 5px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; }
        #loader-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #007bff; font-family: monospace; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
    </style>
</head>
<body>

    <nav>BUILD_v1.0.9</nav>

    <div class="container" id="hub">
        <div class="card">
            <h2>Granny</h2>
            <p>Direct Stable Mirror (v1.8)</p>
            <button class="btn-launch" onclick="boot('granny')">Launch</button>
        </div>
        <div class="card">
            <h2>Space Waves</h2>
            <p>Fast-Paced Geometric Arcade</p>
            <button class="btn-launch" onclick="boot('spacewaves')">Launch</button>
        </div>
    </div>

    <div id="stage">
        <div class="overlay-ui"><button class="exit-btn" onclick="location.reload()">← EXIT TO LIBRARY</button></div>
        <div id="loader-text">ESTABLISHING CONNECTION...</div>
        <div id="game-mount" style="width:100%; height:100%;"></div>
    </div>

    <script>
        // Global SDK fix to prevent the "YaGames" ReferenceError
        window.YaGames = { init: () => Promise.resolve({ deviceInfo: {type: 'desktop'}, adv: {showFullscreenAdv: () => {}} }) };

        function boot(id) {
            document.getElementById('hub').style.display = 'none';
            document.querySelector('nav').style.display = 'none';
            document.getElementById('stage').style.display = 'block';
            const mount = document.getElementById('game-mount');

            if (id === 'granny') {
                // Using a dedicated mirror that handles its own Unity loading to bypass CORS
                mount.innerHTML = `<iframe src="https://ext-6204786.extreme-games.io/6204786/c6f9f8c6-ba46-43bc-9c69-273ee44e0808/" allow="autoplay; fullscreen; gamepad"></iframe>`;
            } else {
                mount.innerHTML = `<iframe src="https://space-waves.co/game/space-waves/" allow="autoplay; fullscreen"></iframe>`;
            }

            // Hide the loader text after a few seconds
            setTimeout(() => {
                const loader = document.getElementById('loader-text');
                if (loader) loader.style.display = 'none';
            }, 4000);
        }
    </script>
</body>
</html>
