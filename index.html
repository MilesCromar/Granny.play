<!DOCTYPE html>
<html lang="en">
<head>
    <title>Game Portal</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-main: #1a1d21;      /* Darker, professional charcoal */
            --card-bg: #ffffff;
            --accent-blue: #2563eb;  /* Deeper, more mature blue */
            --text-dark: #0f172a;
            --text-light: #64748b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-dark);
        }

        /* Mature Navigation */
        nav {
            background: #000;
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        nav h1 { font-size: 1rem; color: #fff; text-transform: uppercase; letter-spacing: 2px; margin: 0; }

        .container {
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        #hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 4px; /* Sharper edges look less like a toy */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-content { padding: 24px; }

        .game-card h2 { margin: 0 0 8px 0; font-size: 1.25rem; font-weight: 600; }
        .game-card p { margin: 0 0 24px 0; color: var(--text-light); font-size: 0.95rem; line-height: 1.5; }

        .btn-launch {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 0;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-launch:hover { opacity: 0.9; }

        /* Game Interface */
        #stage {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
        }

        #controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            z-index: 1001;
            display: flex;
            justify-content: space-between;
        }

        .btn-exit {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        #loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: monospace;
            text-align: center;
        }

        iframe, canvas { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav>
        <h1>System Library</h1>
    </nav>

    <div class="container" id="hub-view">
        <div id="hub-grid">
            <div class="game-card">
                <div class="card-content">
                    <h2>Granny</h2>
                    <p>Standard survival horror simulation. Original assets.</p>
                    <button class="btn-launch" onclick="boot('granny')">Launch</button>
                </div>
            </div>

            <div class="game-card">
                <div class="card-content">
                    <h2>Space Waves</h2>
