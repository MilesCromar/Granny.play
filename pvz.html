<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Plants vs Zombies | NULL Archive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        /* Force total darkness on all layers */
        * {
            background-color: #000000 !important;
        }

        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: #000000 !important;
            overflow: hidden !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }

        #player-container {
            width: 100vw;
            height: 100vh;
            background: #000000 !important;
        }

        ruffle-player {
            width: 100% !important;
            height: 100% !important;
            /* This forces the Ruffle internal canvas to black */
            --background-color: #000000 !important;
        }
    </style>
</head>
<body>
    <div id="player-container"></div>
    
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("player-container");
            container.appendChild(player);
            
            player.load({
                url: "https://cdn.jsdelivr.net/gh/sasa24s/Sphere-compile@95d1d98dc38a920d02e6bbcf61620501b2bacfcb/tables/pvz_9_15.swf",
                allowScriptAccess: true,
                scale: 'showAll',
                letterbox: 'on', 
                forceScale: true,
                backgroundColor: '#000000'
            });
        });
    </script>
</body>
</html>
